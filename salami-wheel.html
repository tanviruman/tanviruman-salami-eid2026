<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eid Wheel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #fff5f9 0%, #ffe6f0 50%, #fff0f7 100%);
            color: #6b5b6e;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* Background animation */
        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(219, 112, 147, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: drift 20s linear infinite;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes drift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .main-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            max-width: 1000px;
            width: 100%;
            position: relative;
            z-index: 1;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            color: #c9499c;
            margin-bottom: 10px;
            font-size: 3rem;
            text-shadow: 0 2px 10px rgba(201, 73, 156, 0.1);
            letter-spacing: 2px;
            font-weight: 800;
        }

        .subtitle {
            margin-bottom: 40px;
            font-size: 1.1rem;
            color: #d9789f;
            text-shadow: 0 1px 3px rgba(201, 73, 156, 0.08);
        }

        .wheel-container {
            position: relative;
            width: 340px;
            height: 340px;
            margin: 0 auto 30px;
            filter: drop-shadow(0 10px 30px rgba(201, 73, 156, 0.15));
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 18px solid transparent;
            border-right: 18px solid transparent;
            border-top: 35px solid #e75480;
            z-index: 10;
            filter: drop-shadow(0 4px 6px rgba(231, 84, 128, 0.2));
        }

        .wheel {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #e75480;
            box-shadow: 0 0 30px rgba(231, 84, 128, 0.3), inset 0 0 20px rgba(255, 255, 255, 0.5);
            transition: transform 18s cubic-bezier(0.17, 0.67, 0.12, 0.99);
            background: white;
        }

        .spin-btn {
            padding: 18px 50px;
            font-size: 1.6rem;
            font-weight: 900;
            background: linear-gradient(135deg, #e75480, #f06fa8);
            color: white;
            border: 3px solid #d94570;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 20px rgba(231, 84, 128, 0.3), inset 0 -3px 0px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative;
            z-index: 5;
            white-space: nowrap;
        }

        .spin-btn:hover {
            background: linear-gradient(135deg, #f06fa8, #e75480);
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(231, 84, 128, 0.4), inset 0 -3px 0px rgba(0, 0, 0, 0.1);
        }

        .spin-btn:active {
            transform: translateY(-1px);
            box-shadow: 0 4px 10px rgba(231, 84, 128, 0.3), inset 0 -1px 0px rgba(0, 0, 0, 0.1);
        }

        .spin-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        /* Modal Styling */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(5px);
            z-index: 30;
            justify-content: center;
            align-items: center;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background: linear-gradient(135deg, #fff8fb 0%, #fff0f7 100%);
            color: #6b5b6e;
            padding: 40px 30px;
            border-radius: 25px;
            text-align: center;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(231, 84, 128, 0.2), 0 0 40px rgba(0, 0, 0, 0.1);
            animation: slideUp 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 3px solid #f06fa8;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .modal-content h2 {
            color: #c9499c;
            margin-bottom: 15px;
            font-size: 2.2rem;
            text-shadow: 0 2px 4px rgba(201, 73, 156, 0.1);
        }

        .reward-amount {
            font-size: 3rem;
            font-weight: 900;
            color: #e75480;
            margin: 20px 0;
            text-shadow: 0 2px 4px rgba(231, 84, 128, 0.15);
            letter-spacing: 1px;
        }

        .modal-content p {
            color: #7b6b7e;
            font-size: 1rem;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .celebration-emoji {
            font-size: 3rem;
            margin-bottom: 10px;
            display: inline-block;
            animation: bounce 1s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .close-btn {
            background: linear-gradient(135deg, #e75480, #f06fa8);
            color: white;
            border: 2px solid #d94570;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1.1rem;
            font-weight: bold;
            width: 100%;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 15px;
        }

        .close-btn:hover {
            background: linear-gradient(135deg, #f06fa8, #e75480);
            transform: scale(1.05);
            box-shadow: 0 4px 15px rgba(231, 84, 128, 0.3);
        }

        .close-btn:active {
            transform: scale(0.98);
        }

        /* PC Layout - Spin button on left */
        @media (min-width: 900px) {
            .main-wrapper {
                flex-direction: row;
                gap: 60px;
            }

            .container {
                display: flex;
                flex-direction: column;
                align-items: center;
                order: 2;
            }

            .spin-btn-wrapper {
                order: 1;
                display: flex;
                align-items: center;
            }

            .spin-btn {
                margin-top: 0;
                writing-mode: vertical-rl;
                text-orientation: mixed;
                padding: 40px 20px;
                height: auto;
                display: flex;
                align-items: center;
                justify-content: center;
                transform: rotate(180deg);
            }

            .spin-btn:hover {
                transform: rotate(180deg) translateY(-3px);
            }

            h1 {
                font-size: 2.8rem;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 2.2rem;
            }

            .wheel-container {
                width: 280px;
                height: 280px;
            }

            .modal-content {
                padding: 30px 20px;
                max-width: 90%;
            }

            .reward-amount {
                font-size: 2.5rem;
            }

            .main-wrapper {
                flex-direction: column;
                gap: 20px;
            }

            .spin-btn {
                writing-mode: horizontal-tb;
                text-orientation: initial;
                transform: none;
            }

            .spin-btn:hover {
                transform: translateY(-3px);
            }

            .spin-btn-wrapper {
                order: 0;
            }
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="spin-btn-wrapper">
            <button class="spin-btn" onclick="spinWheel()" id="spinBtn">SPIN NOW!</button>
        </div>

        <div class="container">
            <h1>ঈদের চাঁদ আকাশে 🌙, সালামি পাঠাবো বিকাশে 😊</h1>
            <p class="subtitle">Spin the wheel to claim your Eid Salami! 💸</p>

            <div class="wheel-container">
                <div class="pointer"></div>
                <svg viewBox="-100 -100 200 200" class="wheel" id="wheel">
                    <defs>
                        <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
                            <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
                        </filter>
                    </defs>
                    <g id="slices">
                        <path d="M0,0 L0,-100 A100,100 0 0,1 86.6,-50 Z" fill="#fff0f7" filter="url(#shadow)"/>
                        <path d="M0,0 L86.6,-50 A100,100 0 0,1 86.6,50 Z" fill="#fde8f2" filter="url(#shadow)"/>
                        <path d="M0,0 L86.6,50 A100,100 0 0,1 0,100 Z" fill="#fce0eb" filter="url(#shadow)"/>
                        <path d="M0,0 L0,100 A100,100 0 0,1 -86.6,50 Z" fill="#fde8f2" filter="url(#shadow)"/>
                        <path d="M0,0 L-86.6,50 A100,100 0 0,1 -86.6,-50 Z" fill="#fff0f7" filter="url(#shadow)"/>
                        <path d="M0,0 L-86.6,-50 A100,100 0 0,1 0,-100 Z" fill="#fce0eb" filter="url(#shadow)"/>
                    </g>
                    <g font-size="16" font-weight="bold" fill="#c9499c" text-anchor="middle" font-family="'Segoe UI', sans-serif">
                        <text transform="rotate(30) translate(0, -65)" font-weight="900">Dua 🤲</text>
                        <text transform="rotate(90) translate(0, -65)" font-weight="900">৳20</text>
                        <text transform="rotate(150) translate(0, -65)" font-weight="900">৳50</text>
                        <text transform="rotate(210) translate(0, -65)" font-weight="900">৳100</text>
                        <text transform="rotate(270) translate(0, -65)" font-weight="900">৳5</text>
                        <text transform="rotate(330) translate(0, -65)" font-weight="900">৳2</text>
                    </g>
                </svg>
            </div>
        </div>
    </div>

    <div class="modal" id="resultModal">
        <div class="modal-content">
            <div class="celebration-emoji">🤲</div>
            <h2>Alhamdulillah!</h2>
            <p>You have won:</p>
            <div class="reward-amount" id="rewardAmount">Unlimited Dua</div>
            <p>May Allah bless your Eid celebration with joy and prosperity!</p>
            <button class="close-btn" onclick="closeModal()">Accept Dua</button>
        </div>
    </div>

    <script>
        let currentRotation = 0;
        let isSpinning = false;

        function spinWheel() {
            if (isSpinning) return;
            isSpinning = true;
            
            document.getElementById('spinBtn').disabled = true;

            // Multiple spins for visual effect - increased to 3-4x
            const spins = Math.floor(Math.random() * 6) + 12;
            
            // Always land on the first slice (Dua) at 0°
            const finalRotation = (spins * 360) + 330;
            
            currentRotation = finalRotation;

            const wheel = document.getElementById('wheel');
            wheel.style.transform = `rotate(${currentRotation}deg)`;

            setTimeout(() => {
                document.getElementById('rewardAmount').textContent = 'Unlimited Dua';
                document.getElementById('resultModal').style.display = 'flex';
                isSpinning = false;
                document.getElementById('spinBtn').disabled = false;
            }, 18000);
        }

        function closeModal() {
            document.getElementById('resultModal').style.display = 'none';
        }
    </script>
</body>
</html>
